<!DOCTYPE html>
<html>
    <head>
        <title>OpenEye Simulator</title>
        <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
        <style>
            .message-header {
                cursor: pointer;
                padding: 8px;
                border-radius: 4px;
                background-color: #f3f4f6;
                transition: background-color 0.2s;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .message-header:hover {
                background-color: #e5e7eb;
            }
            .message-preview {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                color: #6B7280;
                font-size: 0.875rem;
                flex: 1;
                margin: 0 8px;
                position: relative;
                padding-right: 24px;
            }
            .message-arrow {
                color: #6B7280;
                font-size: 0.875rem;
                min-width: 20px;
                text-align: center;
                transform: rotate(0deg);
                transition: transform 0.2s;
            }
            .message-arrow.expanded {
                transform: rotate(90deg);
            }
            .resize-handle {
                color: #9CA3AF;
                font-size: 1rem;
                cursor: col-resize;
                padding: 0 4px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
            }
            .message-timestamp {
                color: #9CA3AF;
                font-size: 0.75rem;
                min-width: 60px;
            }
            .footer {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 1rem;
                background-color: white;
                border-top: 1px solid #e5e7eb;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .footer-logo {
                height: 60px;
                width: auto;
                margin-left: 1rem;
            }
            .footer-links {
                display: flex;
                gap: 2rem;
                margin-right: 2rem;
            }
            .footer-link {
                color: #3B82F6;
                text-decoration: none;
                font-size: 1rem;
                font-weight: 500;
                transition: color 0.2s;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .footer-link:hover {
                color: #2563EB;
            }
            .github-icon {
                width: 20px;
                height: 20px;
            }
            .message-content {
                position: relative;
                margin-top: 0.5rem;
                background-color: #f9fafb;
                border-radius: 0.375rem;
                overflow: hidden;
            }
            .message-text {
                white-space: pre-wrap;
                word-break: break-word;
                font-size: 0.875rem;
                color: #374151;
                padding: 0.5rem 1rem;
                overflow-y: auto;
            }
            .content-resize-handle {
                position: absolute;
                right: 4px;
                bottom: 4px;
                width: 12px;
                height: 12px;
                cursor: nw-resize;
                opacity: 0.6;
                background-image: radial-gradient(circle, #9CA3AF 1.5px, transparent 1.5px);
                background-size: 4px 4px;
                transition: opacity 0.2s;
            }
            .content-resize-handle:hover {
                opacity: 1;
            }
        </style>
    </head>
    <body class="bg-gray-50">
        <div id="root"></div>
        <script type="text/babel">
            function App() {
                const [state, setState] = React.useState({
                    inputs: {},
                    current_action: "idle",
                    last_speech: "",
                    current_emotion: "",
                    system_latency: {
                        fuse_time: 0,
                        llm_start: 0,
                        processing: 0,
                        complete: 0
                    }
                });
                const [error, setError] = React.useState(null);
                const [connected, setConnected] = React.useState(false);
                const [expandedMessages, setExpandedMessages] = React.useState({});
                const [messageHeights, setMessageHeights] = React.useState({});
                const [isResizing, setIsResizing] = React.useState(null);
                const resizeRef = React.useRef(null);

                const startResizing = React.useCallback((messageId, e) => {
                    e.stopPropagation();
                    setIsResizing(messageId);
                    document.body.classList.add('no-select');
                }, []);

                const stopResizing = React.useCallback(() => {
                    setIsResizing(null);
                    document.body.classList.remove('no-select');
                }, []);

                const handleResize = React.useCallback((e) => {
                    if (isResizing && resizeRef.current) {
                        const container = resizeRef.current;
                        const containerRect = container.getBoundingClientRect();
                        const newHeight = Math.max(100, e.clientY - containerRect.top);
                        setMessageHeights(prev => ({
                            ...prev,
                            [isResizing]: newHeight
                        }));
                    }
                }, [isResizing]);

                React.useEffect(() => {
                    const ws = new WebSocket(`ws://${window.location.host}/ws`);

                    ws.onopen = () => {
                        console.log('Connected to WebSocket');
                        setConnected(true);
                    };

                    ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        setState(data);
                    };

                    ws.onerror = (error) => {
                        console.error('WebSocket error:', error);
                        setError('Failed to connect to server');
                    };

                    ws.onclose = () => {
                        setConnected(false);
                        setError('Connection lost. Reconnecting...');
                        setTimeout(() => window.location.reload(), 2000);
                    };

                    return () => ws.close();
                }, []);

                React.useEffect(() => {
                    if (isResizing) {
                        window.addEventListener('mousemove', handleResize);
                        window.addEventListener('mouseup', stopResizing);
                        return () => {
                            window.removeEventListener('mousemove', handleResize);
                            window.removeEventListener('mouseup', stopResizing);
                        };
                    }
                }, [isResizing, handleResize, stopResizing]);

                const groupedMessages = React.useMemo(() => {
                    const groups = {};
                    Object.entries(state.inputs || {}).forEach(([key, value]) => {
                        const inputType = value.input_type || 'Unknown';
                        if (!groups[inputType]) {
                            groups[inputType] = [];
                        }
                        groups[inputType].push({ id: key, ...value });
                    });
                    return groups;
                }, [state.inputs]);

                if (error) {
                    return (
                        <div className="min-h-screen flex items-center justify-center">
                            <div className="text-red-600">{error}</div>
                        </div>
                    );
                }

                if (!connected) {
                    return (
                        <div className="min-h-screen flex items-center justify-center">
                            <div>Connecting...</div>
                        </div>
                    );
                }

                return (
                    <div className="min-h-screen p-4 pb-16">
                        <div className="container mx-auto">
                            <div className="flex">
                                {/* Input History */}
                                <div className="bg-white rounded-lg shadow p-4" style={{ width: '33%' }}>
                                    <div className="flex flex-col">
                                        <h2 className="text-xl font-bold mb-4">Input History</h2>
                                        <div className="space-y-2">
                                            {Object.entries(groupedMessages)
                                                .sort(([a], [b]) => a.localeCompare(b))
                                                .map(([inputType, messages]) => (
                                                    <div key={inputType}>
                                                        <h3 className="text-sm font-semibold text-gray-700 mb-2">
                                                            {inputType}
                                                        </h3>
                                                        {messages
                                                            .sort((a, b) => b.timestamp - a.timestamp)
                                                            .map((message) => (
                                                                <div key={message.id} className="mb-2">
                                                                    <div
                                                                        className="message-header"
                                                                        onClick={() => setExpandedMessages(prev => ({
                                                                            ...prev,
                                                                            [message.id]: !prev[message.id]
                                                                        }))}
                                                                    >
                                                                        <span className={`message-arrow ${expandedMessages[message.id] ? 'expanded' : ''}`}>
                                                                            &#9654;
                                                                        </span>
                                                                        <span className="message-timestamp">
                                                                            {message.timestamp.toFixed(3)}s
                                                                        </span>
                                                                        <span className="message-preview">
                                                                            {message.input.substring(0, 50)}
                                                                            {message.input.length > 50 ? '...' : ''}
                                                                        </span>
                                                                    </div>
                                                                    {expandedMessages[message.id] && (
                                                                        <div
                                                                            className="message-content"
                                                                            ref={isResizing === message.id ? resizeRef : null}
                                                                            style={{ height: messageHeights[message.id] || 'auto', minHeight: '100px' }}
                                                                        >
                                                                            <div className="message-text">
                                                                                {message.input}
                                                                            </div>
                                                                            <div
                                                                                className="content-resize-handle"
                                                                                onMouseDown={(e) => startResizing(message.id, e)}
                                                                            />
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            ))}
                                                    </div>
                                                ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Main Display */}
                                <div className="flex-1 ml-4">
                                    <div className="bg-white rounded-lg shadow p-4 mb-4">
                                        <h2 className="text-xl font-bold mb-4">Current State</h2>
                                        <div className="space-y-4">
                                            <div>
                                                <span className="font-semibold">Action:</span>
                                                <span className="ml-2 text-blue-600">{state.current_action}</span>
                                            </div>
                                            <div>
                                                <span className="font-semibold">Last Speech:</span>
                                                <div className="mt-1 p-2 bg-gray-50 rounded">
                                                    {state.last_speech || "No speech yet"}
                                                </div>
                                            </div>
                                            <div>
                                                <span className="font-semibold">Emotion:</span>
                                                <span className="ml-2 text-purple-600">{state.current_emotion}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-lg shadow p-4">
                                        <h2 className="text-xl font-bold mb-4">System Latency</h2>
                                        <div className="space-y-2">
                                            {Object.entries(state.system_latency || {}).map(([key, value]) => (
                                                <div key={key} className="flex justify-between items-center">
                                                    <span className="font-semibold">{key}:</span>
                                                    <span className="text-gray-600">
                                                        {value ? value.toFixed(3) : '0.000'}s
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="footer">
                            <div className="footer-links">
                                <span className="footer-link" style={{fontWeight: 'bold'}}>OpenEye Perception Engine</span>
                                <span className="footer-link" style={{opacity: 0.5}}>|</span>
                                <span className="footer-link" style={{opacity: 0.6, fontSize: '0.75rem'}}>Based on OM1 (MIT)</span>
                            </div>
                        </div>
                    </div>
                );
            }

            ReactDOM.render(<App />, document.getElementById('root'));
        </script>
    </body>
</html>
