version: "1.0"
name: "desktop_privacy"
domain: "desktop_agent"

policies:
  - name: "pii_protection"
    type: "pii_filter"
    enabled: true
    domain: "desktop_agent"
    severity: "high"
    enforcement: "enforce"
    config:
      redact_patterns:
        - type: "email"
          action: "redact"
        - type: "phone"
          action: "redact"
        - type: "ssn"
          action: "block_and_alert"
        - type: "credit_card"
          action: "block_and_alert"

  - name: "password_protection"
    type: "interaction_boundary"
    enabled: true
    domain: "desktop_agent"
    severity: "critical"
    enforcement: "enforce"
    config:
      deny_action_types:
        - "type.*password"
        - "fill.*credential"
      read_only_apps:
        - "banking"
        - "bank"

  - name: "privacy_rate_limit"
    type: "rate_limiter"
    enabled: true
    severity: "medium"
    enforcement: "enforce"
    config:
      max_actions: 60
      window_seconds: 60
      error_cooldown_seconds: 3

settings:
  log_all_decisions: true
  fail_open: false
  evaluation_timeout_ms: 50
